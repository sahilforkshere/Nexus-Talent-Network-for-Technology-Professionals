services:
  # PostgreSQL — main relational DB: users, jobs, posts, connections
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus
      POSTGRES_DB: nexus
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Neo4j — graph DB: social connections, skill relationships
  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/nexuspassword
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Elasticsearch — keyword job search with filters
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"'"]
      interval: 10s
      timeout: 10s
      retries: 10

  # Redis — feed cache (sorted sets of post IDs per user) + session store
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Zookeeper — required by Kafka for cluster coordination
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zk_data:/var/lib/zookeeper/data

  # Kafka — event bus: user_created, connection_accepted, post_created, job_posted
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10

  profile-svc:
    image: nexus-profile-svc
    ports:
      - "4001:4001"
    environment:
      DATABASE_URL: postgres://nexus:nexus@postgres:5432/nexus?sslmode=disable
      NEO4J_URL: bolt://neo4j:7687
      ELASTICSEARCH_URL: http://elasticsearch:9200
      KAFKA_BROKER: kafka:29092
      JWT_SECRET: ${JWT_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      kafka:
        condition: service_healthy

  jobs-svc:
    image: nexus-jobs-svc
    ports:
      - "4002:4002"
    environment:
      DATABASE_URL: postgres://nexus:nexus@postgres:5432/nexus?sslmode=disable
      ELASTICSEARCH_URL: http://elasticsearch:9200
      KAFKA_BROKER: kafka:29092
      JWT_SECRET: ${JWT_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      kafka:
        condition: service_healthy

  network-svc:
    image: nexus-network-svc
    ports:
      - "4003:4003"
    environment:
      NEO4J_URL: bolt://neo4j:7687
      KAFKA_BROKER: kafka:29092
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      neo4j:
        condition: service_healthy
      kafka:
        condition: service_healthy

  feed-svc:
    image: nexus-feed-svc
    ports:
      - "4004:4004"
    environment:
      DATABASE_URL: postgres://nexus:nexus@postgres:5432/nexus?sslmode=disable
      REDIS_URL: redis://redis:6379
      KAFKA_BROKER: kafka:29092
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  search-svc:
    image: nexus-search-svc
    ports:
      - "4005:4005"
    environment:
      ELASTICSEARCH_URL: http://elasticsearch:9200
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_PASSWORD: nexuspassword
      KAFKA_BROKER: kafka:29092
      JWT_SECRET: ${JWT_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    depends_on:
      elasticsearch:
        condition: service_healthy
      neo4j:
        condition: service_healthy

volumes:
  postgres_data:
  neo4j_data:
  es_data:
  redis_data:
  zk_data:
